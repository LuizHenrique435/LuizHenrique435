name: Subir Nivel Medalhas
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Criar alteração e Branch
        run: |
          git config --global user.name "LuizHenrique435"
          git config --global user.email "henriquesouzasilva80@gmail.com"
          
          # Cria branch única
          git checkout -b "subir-nivel-${{ github.run_id }}"
          
          # Altera o arquivo para gerar o commit
          echo "Update: $(date)" >> progresso.txt
          
          git add progresso.txt
          git commit -m "Upgrade medalhas
          
          Co-authored-by: GitHub <noreply@github.com>"
          
          git push origin "subir-nivel-${{ github.run_id }}"

      - name: Abrir e Mesclar PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cria o PR e guarda o link
          PR_URL=$(gh pr create --title "Auto Upgrade" --body "Subindo nível das medalhas")
          # Mescla o PR imediatamente e deleta a branch
          gh pr merge $PR_URL --merge --admin --delete-branch
